[pytest]
markers =
    real_docling: real, unmocked Docling OCR calls against benchmark PDFs (slow - roughly 1-3 minutes per page). Skip with: pytest -m "not real_docling"
    real_surya: real, unmocked Surya OCR fallback calls against benchmark PDFs (slow - model load plus inference per page). Skip with: pytest -m "not real_surya"
